<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026年度营销中心·即时激励表彰公示</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="employee-view">
    <div class="page-deco" aria-hidden="true">
      <div class="mesh-gradient"></div>
      <div class="festive-stars">
        <span class="festive-star">✦</span>
        <span class="festive-star">★</span>
        <span class="festive-star">✧</span>
        <span class="festive-star">★</span>
        <span class="festive-star">✦</span>
        <span class="festive-star">☆</span>
        <span class="festive-star">★</span>
        <span class="festive-star">✧</span>
        <span class="festive-star">✦</span>
        <span class="festive-star">☆</span>
        <span class="festive-star">★</span>
        <span class="festive-star">✧</span>
      </div>
      <img class="brand-logo" src="" alt="安恒信息" />
    </div>

    <header class="header-banner">
      <h1 id="banner-title"></h1>
    </header>

    <aside
      id="culture-side-rail"
      class="culture-side-rail"
      aria-label="部门文化关键词"
      hidden
    >
      <p class="culture-side-rail__text">主动·担当·学习·分享·激情·保持简单</p>
    </aside>

    <div class="action-bar">
      <div class="action-inner">
        <div class="tab-bar">
          <button type="button" class="tab-btn active" data-dept="management">营销综合管理部</button>
          <button type="button" class="tab-btn" data-dept="sales">营销中心-行销部</button>
        </div>
      </div>
    </div>

    <div class="content-panel">
      <div class="main-container" id="blocks-root"></div>
    </div>

    <footer class="site-footer">
      <p>营销综合管理部</p>
      <p>版权所有 · All Rights Reserved</p>
    </footer>

    <div id="policy-modal" class="modal-overlay" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="policy-modal-title">
        <div class="modal-header">
          <h2 id="policy-modal-title"></h2>
          <button type="button" class="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body" id="policy-modal-body"></div>
        <div class="modal-footer">
          <a id="policy-attachment" class="btn-attachment" href="#" download hidden>下载附件</a>
        </div>
      </div>
    </div>

    <script src="js/logo-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/photos-data.js"></script>
    <script src="js/policies.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
